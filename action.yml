name: "STANCE GitHub Action"
description: "Install and run STANCE posture evaluation in GitHub Actions"

inputs:
  provider:
    description: "STANCE provider to evaluate."
    required: false
    default: "microsoft365"
  suite:
    description: "STANCE suite to evaluate."
    required: false
    default: "entra"
  output-directory:
    description: "Directory for generated facts, result JSON, and reports."
    required: false
    default: "stance-results"
  formats:
    description: "Comma-separated report formats to generate."
    required: false
    default: "json,html,sarif"
  facts-path:
    description: "Existing facts JSON to evaluate instead of collecting live facts."
    required: false
    default: ""
  auth-mode:
    description: "Authentication source for live collection. Supported values: env, github-oidc."
    required: false
    default: "env"
  oidc-audience:
    description: "Audience to request for the GitHub OIDC token."
    required: false
    default: "api://AzureADTokenExchange"
  tenant-id:
    description: "Optional Microsoft tenant ID. If set, exported as STANCE_TENANT_ID."
    required: false
    default: ""
  client-id:
    description: "Optional Microsoft client/application ID. If set, exported as STANCE_CLIENT_ID."
    required: false
    default: ""
  stance-version:
    description: "Version source: local, latest, or semantic tag vX.Y.Z."
    required: false
    default: "local"
  fail-on-findings:
    description: "Reserved for future behavior; currently not implemented."
    required: false
    default: "false"

outputs:
  facts-path:
    description: "Path to facts used for evaluation."
    value: ${{ steps.run.outputs.facts-path }}
  results-path:
    description: "Path to durable STANCE result JSON."
    value: ${{ steps.run.outputs.results-path }}
  html-path:
    description: "Path to generated HTML report, if requested."
    value: ${{ steps.run.outputs.html-path }}
  sarif-path:
    description: "Path to generated SARIF report, if requested."
    value: ${{ steps.run.outputs.sarif-path }}
  markdown-path:
    description: "Path to generated Markdown report, if requested."
    value: ${{ steps.run.outputs.markdown-path }}
  junit-path:
    description: "Path to generated JUnit XML report, if requested."
    value: ${{ steps.run.outputs.junit-path }}

runs:
  using: "composite"
  steps:
    - name: Resolve/install STANCE binary
      shell: bash
      run: |
        set -euo pipefail
        version_input="${{ inputs.stance-version }}"
        repo_owner="goldjg"
        repo_name="stance"
        release_base_api="https://api.github.com/repos/${repo_owner}/${repo_name}/releases"
        release_base_download="https://github.com/${repo_owner}/${repo_name}/releases/download"

        runner_os="${RUNNER_OS}"
        runner_arch="${RUNNER_ARCH}"

        tag=""
        if [ "${version_input}" = "local" ]; then
          go build -o "${RUNNER_TEMP}/stance" ./cmd/stance
        elif [ "${version_input}" = "latest" ]; then
          latest_response="$(curl --fail --silent --show-error "${release_base_api}/latest")"
          tag="$(
            printf '%s' "${latest_response}" \
              | tr -d '\n' \
              | grep -oE '"tag_name"[[:space:]]*:[[:space:]]*"[^"]+"' \
              | head -n1 \
              | sed -E 's/.*"([^"]+)"$/\1/'
          )"
          if [ -z "${tag}" ]; then
            echo "Failed to resolve latest release tag from ${repo_owner}/${repo_name}."
            exit 1
          fi
        elif [[ "${version_input}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
          tag="${version_input}"
        else
          echo "Unsupported stance-version: ${version_input}"
          echo "Supported values: local, latest, or semantic tag vX.Y.Z"
          exit 1
        fi

        if [ "${version_input}" != "local" ]; then
          asset_os=""
          asset_arch=""
          archive_ext=""
          case "${runner_os}:${runner_arch}" in
            Linux:X64)
              asset_os="linux"
              asset_arch="amd64"
              archive_ext="tar.gz"
              ;;
            Linux:ARM64)
              asset_os="linux"
              asset_arch="arm64"
              archive_ext="tar.gz"
              ;;
            macOS:X64)
              asset_os="darwin"
              asset_arch="amd64"
              archive_ext="tar.gz"
              ;;
            macOS:ARM64)
              asset_os="darwin"
              asset_arch="arm64"
              archive_ext="tar.gz"
              ;;
            Windows:X64)
              asset_os="windows"
              asset_arch="amd64"
              archive_ext="zip"
              ;;
            *)
              echo "Unsupported runner target for released-binary mode: ${runner_os}/${runner_arch}"
              echo "Supported targets: linux/amd64, linux/arm64, darwin/amd64, darwin/arm64, windows/amd64"
              exit 1
              ;;
          esac

          asset_version="${tag#v}"
          if [ -z "${asset_version}" ] || [ "${asset_version}" = "${tag}" ]; then
            echo "Invalid release tag format '${tag}'; expected tag starting with 'v'."
            exit 1
          fi

          archive_name="stance_${asset_version}_${asset_os}_${asset_arch}.${archive_ext}"
          checksums_name="checksums.txt"
          archive_url="${release_base_download}/${tag}/${archive_name}"
          checksums_url="${release_base_download}/${tag}/${checksums_name}"
          archive_path="${RUNNER_TEMP}/${archive_name}"
          checksums_path="${RUNNER_TEMP}/${checksums_name}"

          curl --fail --silent --show-error --location --output "${archive_path}" "${archive_url}"
          curl --fail --silent --show-error --location --output "${checksums_path}" "${checksums_url}"

          expected_sha="$(
            awk -v file="${archive_name}" '
              {
                name = $NF
                sub(/^\*/, "", name)
                if (name == file) {
                  print $1
                  exit
                }
              }
            ' "${checksums_path}"
          )"
          if [ -z "${expected_sha}" ]; then
            echo "Checksum for ${archive_name} was not found in ${checksums_name}."
            exit 1
          fi

          actual_sha=""
          if command -v sha256sum >/dev/null 2>&1; then
            actual_sha="$(sha256sum "${archive_path}" | awk '{print $1}')"
          elif command -v shasum >/dev/null 2>&1; then
            actual_sha="$(shasum -a 256 "${archive_path}" | awk '{print $1}')"
          elif [ "${runner_os}" = "Windows" ]; then
            actual_sha="$(
              powershell -NoProfile -Command "(Get-FileHash -Algorithm SHA256 -Path '${archive_path}').Hash.ToLowerInvariant()"
            )"
          else
            echo "No SHA-256 tool is available on this runner."
            exit 1
          fi

          if [ "${actual_sha}" != "${expected_sha}" ]; then
            echo "Checksum mismatch for ${archive_name}."
            echo "Expected: ${expected_sha}"
            echo "Actual:   ${actual_sha}"
            exit 1
          fi

          if [ "${archive_ext}" = "tar.gz" ]; then
            tar -xzf "${archive_path}" -C "${RUNNER_TEMP}"
          elif [ "${archive_ext}" = "zip" ]; then
            if command -v unzip >/dev/null 2>&1; then
              unzip -o "${archive_path}" -d "${RUNNER_TEMP}" >/dev/null
            else
              powershell -NoProfile -Command "Expand-Archive -Path '${archive_path}' -DestinationPath '${RUNNER_TEMP}' -Force"
            fi
          else
            echo "Unsupported archive format: ${archive_ext}"
            exit 1
          fi
        fi

        stance_bin=""
        if [ -f "${RUNNER_TEMP}/stance" ]; then
          stance_bin="${RUNNER_TEMP}/stance"
        elif [ -f "${RUNNER_TEMP}/stance.exe" ]; then
          stance_bin="${RUNNER_TEMP}/stance.exe"
        else
          echo "STANCE binary was not found after install."
          exit 1
        fi

        if [ "${runner_os}" != "Windows" ]; then
          chmod +x "${stance_bin}"
        fi

        echo "STANCE_BIN=${stance_bin}" >> "${GITHUB_ENV}"

    - name: Prepare authentication environment
      shell: bash
      run: |
        set -euo pipefail

        facts_input="${{ inputs.facts-path }}"
        facts_input="${facts_input#"${facts_input%%[![:space:]]*}"}"
        facts_input="${facts_input%"${facts_input##*[![:space:]]}"}"

        auth_mode="$(echo "${{ inputs.auth-mode }}" | tr '[:upper:]' '[:lower:]')"
        tenant_id="${{ inputs.tenant-id }}"
        client_id="${{ inputs.client-id }}"
        oidc_audience="${{ inputs.oidc-audience }}"

        if [ -n "${tenant_id}" ]; then
          echo "STANCE_TENANT_ID=${tenant_id}" >> "${GITHUB_ENV}"
        fi

        if [ -n "${client_id}" ]; then
          echo "STANCE_CLIENT_ID=${client_id}" >> "${GITHUB_ENV}"
        fi

        if [ -n "${facts_input}" ]; then
          echo "facts-path provided; skipping live-collection auth preparation."
          exit 0
        fi

        case "${auth_mode}" in
          env)
            ;;
          github-oidc)
            if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
              echo "GitHub OIDC request environment is unavailable for auth-mode=github-oidc."
              echo "For live collection with github-oidc, set workflow permissions: id-token: write."
              exit 1
            fi

            oidc_request_url="$(
              OIDC_AUDIENCE="${oidc_audience}" python3 - <<'PY'
import os
from urllib.parse import parse_qsl, urlencode, urlsplit, urlunsplit

base = os.environ["ACTIONS_ID_TOKEN_REQUEST_URL"]
audience = os.environ["OIDC_AUDIENCE"]

parts = urlsplit(base)
query = [(k, v) for (k, v) in parse_qsl(parts.query, keep_blank_values=True) if k != "audience"]
query.append(("audience", audience))
print(urlunsplit((parts.scheme, parts.netloc, parts.path, urlencode(query), parts.fragment)))
PY
            )"

            oidc_response="$(curl --fail --silent --show-error \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${oidc_request_url}")"
            client_assertion="$(
              OIDC_RESPONSE="${oidc_response}" python3 -c 'import json, os; payload = json.loads(os.environ["OIDC_RESPONSE"]); token = payload.get("value", ""); 
if not token:
    raise SystemExit("GitHub OIDC token response did not include a value field.")
print(token, end="")'
            )"

            echo "::add-mask::${client_assertion}"
            echo "STANCE_CLIENT_ASSERTION=${client_assertion}" >> "${GITHUB_ENV}"
            ;;
          *)
            echo "Unsupported auth-mode: ${auth_mode}"
            echo "Supported values: env, github-oidc"
            exit 1
            ;;
        esac

    - name: Collect/check/report
      id: run
      shell: bash
      run: |
        set -euo pipefail
        stance_bin="${STANCE_BIN:-${RUNNER_TEMP}/stance}"
        if [ ! -f "${stance_bin}" ] && [ -f "${RUNNER_TEMP}/stance.exe" ]; then
          stance_bin="${RUNNER_TEMP}/stance.exe"
        fi
        if [ ! -f "${stance_bin}" ]; then
          echo "STANCE binary not found at expected path."
          exit 1
        fi

        provider="${{ inputs.provider }}"
        suite="${{ inputs.suite }}"
        output_directory="${{ inputs.output-directory }}"
        formats_input="${{ inputs.formats }}"
        facts_input="${{ inputs.facts-path }}"
        facts_input="${facts_input#"${facts_input%%[![:space:]]*}"}"
        facts_input="${facts_input%"${facts_input##*[![:space:]]}"}"
        fail_on_findings="$(echo "${{ inputs.fail-on-findings }}" | tr '[:upper:]' '[:lower:]')"

        mkdir -p "${output_directory}"

        if [ "${fail_on_findings}" = "true" ]; then
          echo "fail-on-findings is reserved and not implemented in this action version."
        fi

        results_path="${output_directory}/results.json"
        if [ -n "${facts_input}" ]; then
          if [ ! -f "${facts_input}" ]; then
            echo "facts-path does not exist: ${facts_input}"
            exit 1
          fi
          facts_path="${facts_input}"
        else
          facts_path="${output_directory}/facts.json"
          "${stance_bin}" collect \
            --provider "${provider}" \
            --out "${facts_path}"
        fi

        "${stance_bin}" check \
          --facts "${facts_path}" \
          --provider "${provider}" \
          --suite "${suite}" \
          --format json \
          --out "${results_path}"

        want_html=false
        want_sarif=false
        want_markdown=false
        want_junit=false

        IFS=',' read -r -a requested_formats <<< "${formats_input}"
        for raw in "${requested_formats[@]}"; do
          format="${raw#"${raw%%[![:space:]]*}"}"
          format="${format%"${format##*[![:space:]]}"}"
          format="$(echo "${format}" | tr '[:upper:]' '[:lower:]')"
          if [ -z "${format}" ]; then
            continue
          fi
          case "${format}" in
            json)
              ;;
            html)
              want_html=true
              ;;
            sarif)
              want_sarif=true
              ;;
            md|markdown)
              want_markdown=true
              ;;
            junit)
              want_junit=true
              ;;
            *)
              echo "Unsupported report format: ${format}"
              echo "Supported formats: json, html, sarif, md/markdown, junit"
              exit 1
              ;;
          esac
        done

        html_path=""
        sarif_path=""
        markdown_path=""
        junit_path=""

        if [ "${want_html}" = "true" ]; then
          html_path="${output_directory}/stance.html"
          "${stance_bin}" report \
            --results "${results_path}" \
            --format html \
            --out "${html_path}"
        fi

        if [ "${want_sarif}" = "true" ]; then
          sarif_path="${output_directory}/stance.sarif"
          "${stance_bin}" report \
            --results "${results_path}" \
            --format sarif \
            --out "${sarif_path}"
        fi

        if [ "${want_markdown}" = "true" ]; then
          markdown_path="${output_directory}/stance.md"
          "${stance_bin}" report \
            --results "${results_path}" \
            --format markdown \
            --out "${markdown_path}"
        fi

        if [ "${want_junit}" = "true" ]; then
          junit_path="${output_directory}/stance.junit.xml"
          "${stance_bin}" report \
            --results "${results_path}" \
            --format junit \
            --out "${junit_path}"
        fi

        {
          echo "facts-path=${facts_path}"
          echo "results-path=${results_path}"
          echo "html-path=${html_path}"
          echo "sarif-path=${sarif_path}"
          echo "markdown-path=${markdown_path}"
          echo "junit-path=${junit_path}"
        } >> "${GITHUB_OUTPUT}"
