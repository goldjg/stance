# Documentation example only.
# Copy this file to .github/workflows/ in your own repository to enable it.
name: example-stance-microsoft365

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  posture-local-dogfooding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run STANCE (live collection, local source)
        id: stance
        uses: ./
        with:
          stance-version: local
          auth-mode: github-oidc
          tenant-id: ${{ vars.STANCE_TENANT_ID }}
          client-id: ${{ vars.STANCE_CLIENT_ID }}
          provider: microsoft365
          suite: entra
          formats: json,html,sarif
          output-directory: stance-results
          # Entra app/service principal setup is external to STANCE.
          # Configure a federated identity credential for this repo/ref/environment.
          # GitHub supplies the OIDC assertion; Entra validates it during client assertion token acquisition.
          # STANCE does not create that trust relationship.

      - name: Upload SARIF
        if: ${{ steps.stance.outputs.sarif-path != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.stance.outputs.sarif-path }}

      - name: Upload STANCE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stance-results-live
          path: |
            ${{ steps.stance.outputs.facts-path }}
            ${{ steps.stance.outputs.results-path }}
            ${{ steps.stance.outputs.html-path }}
            ${{ steps.stance.outputs.sarif-path }}

  posture-external-pinned:
    runs-on: ubuntu-latest
    steps:
      - name: Run STANCE (live collection, external pinned release)
        id: stance
        uses: goldjg/stance@v0.1.0 # Example tag placeholder; pin to a real release tag.
        with:
          stance-version: v0.1.0
          auth-mode: github-oidc
          tenant-id: ${{ vars.STANCE_TENANT_ID }}
          client-id: ${{ vars.STANCE_CLIENT_ID }}
          provider: microsoft365
          suite: entra
          formats: json,html,sarif
          output-directory: stance-results

      - name: Upload SARIF
        if: ${{ steps.stance.outputs.sarif-path != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.stance.outputs.sarif-path }}

      - name: Upload STANCE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stance-results-live-external
          path: |
            ${{ steps.stance.outputs.facts-path }}
            ${{ steps.stance.outputs.results-path }}
            ${{ steps.stance.outputs.html-path }}
            ${{ steps.stance.outputs.sarif-path }}
